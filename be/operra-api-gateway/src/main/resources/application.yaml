server:
  port: 8888

app:
  api-prefix: /api/v1

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity_service
              uri: http://localhost:8080
              predicates:
                - Path=${app.api-prefix}/identity/**
              filters:
                - StripPrefix=2
            - id: organization_service
              uri: http://localhost:8081
              predicates:
                - Path=${app.api-prefix}/organization/**
              filters:
                - StripPrefix=2
            - id: scheduling_service
              uri: http://localhost:8082
              predicates:
                - Path=${app.api-prefix}/scheduling/**
              filters:
                - StripPrefix=2



