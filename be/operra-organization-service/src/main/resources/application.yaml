spring:
  application:
    name: oppera-organization-service
  datasource:
    username: ${ORGANIZATION_DB_USERNAME}
    password: ${ORGANIZATION_DB_PASSWORD}
    url: ${ORGANIZATION_DB_CONNECTION}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081
  servlet:
    context-path: /organization
