spring:
  application:
    name: oppera-organization-service
  datasource:
    username: ${ORGANIZATION_DB_USERNAME}
    password: ${ORGANIZATION_DB_PASSWORD}
    url: ${ORGANIZATION_DB_CONNECTION}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer # đổi object thành json


server:
  port: 8081
  servlet:
    context-path: /organization

app:
  services:
    user_account: http://localhost:8080/identity
