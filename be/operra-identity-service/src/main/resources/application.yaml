server:
  port: 8080
  servlet:
    context-path: /identity
spring:
  datasource:
    username: ${DBMS_USERNAME}
    password: ${DBMS_PASSWORD}
    url: ${DBMS_CONNECTION}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  signerKey: ${SIGNER_KEY}
  valid-duration: 3600
  refreshable-duration: 36000
